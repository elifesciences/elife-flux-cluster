apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-imagepullsecret
  annotations:
    policies.kyverno.io/title: Add imagePullSecret to all pods
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
spec:
  rules:
    - name: add-imagepullsecret
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        any:
          - key: "docker.io"
            operator: AnyIn
            value: "{{ images.containers.*.registry }}"
      mutate:
        patchStrategicMerge:
          spec:
            imagePullSecrets:
              - name: image-pull-secrets