apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:update-namespaces
  labels:
    # Aggregated into the kyverno background controller's ClusterRole so it
    # can mutate existing Namespaces (mutateExistingOnPolicyUpdate).
    rbac.kyverno.io/aggregate-to-background-controller: "true"
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
      - update
