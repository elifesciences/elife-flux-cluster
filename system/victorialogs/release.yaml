apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victorialogs
spec:
  releaseName: victorialogs
  chart:
    spec:
      chart: victoria-logs-single
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
      version: "0.12.2"
  interval: 1h0m0s
  values:
    server:
      retentionPeriod: 30d
      extraArgs:
        insert.maxLineSizeBytes: "1048576"
      resources:
        requests:
          cpu: 150m
          memory: 850Mi
      persistentVolume:
        enabled: true
        storageClassName: ebs-st1
        size: 200Gi
      serviceMonitor:
        enabled: true
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt"
          traefik.ingress.kubernetes.io/router.middlewares: traefik-elife-oauth@kubernetescrd
        hosts:
          - name: victorialogs.${cluster_domain}
            path: /select
            port: http
        tls:
          - secretName: victorialogs-tls
            hosts:
              - victorialogs.${cluster_domain}
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: "1"
    fluent-bit:
      enabled: false
