---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-operator
  namespace: db-operator-system

spec:
  interval: 1m
  releaseName: opensearch-operator
  chart:
    spec:
      chart: opensearch-operator
      version: 2.8.0
      sourceRef:
        kind: HelmRepository
        name: opensearch
      interval: 1m
  install:
    remediation:
      retries: 5

  values:
    manager:
      resources:
        limits: null
        requests:
          cpu: 25m
          memory: 300Mi
    kubeRbacProxy:
      resources:
        limits: null
        requests:
          cpu: 25m
          memory: 15Mi
      # kube-rbac-proxy is deprecated. You should probably check if this is even still used by opensearch-operator and remove if not
      image:
        repository: registry.k8s.io/kubebuilder/kube-rbac-proxy
