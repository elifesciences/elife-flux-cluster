---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 5m
  chart:
    spec:
      chart: reloader
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: stakater
  values:
    reloader:
      deployment:
        resources:
          limits:
            memory: "150Mi"
          requests:
            cpu: "40m"
            memory: "128Mi"
