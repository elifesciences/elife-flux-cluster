apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pipelines.app-conveyor.elifesciences.org
spec:
  group: app-conveyor.elifesciences.org
  names:
    kind: Pipeline
    plural: pipelines
    singular: pipeline
    shortNames:
      - pl
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                pollIntervalMs:
                  type: integer
                  minimum: 1
                  maximum: 9007199254740991
                steps:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                          - git
                          - gha
                          - ghcr
                          - gh-pr
                          - flux-image
                          - flux-kustomize
                          - k8s-deploy
                      label:
                        type: string
                      repo:
                        type: string
                      branch:
                        type: string
                      workflow:
                        type: string
                      image:
                        type: string
                      tagPattern:
                        type: string
                      author:
                        type: string
                      policy:
                        type: string
                      imageRepository:
                        type: string
                      name:
                        type: string
                      automation:
                        type: string
                      namespace:
                        type: string
                      deployment:
                        type: string
                      kind:
                        type: string
                        enum:
                          - Deployment
                          - StatefulSet
                    required:
                      - id
                      - type
              required:
                - name
                - steps
