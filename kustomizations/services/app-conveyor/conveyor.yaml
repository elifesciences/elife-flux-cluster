pipelines:
  - id: app-conveyor
    name: App Conveyor
    pollIntervalMs: 60000
    steps:
      - id: src
        type: git
        repo: elifesciences/app-conveyor
        branch: main

      - id: ci
        type: gha
        repo: elifesciences/app-conveyor
        workflow: build-push.yml

      - id: reg
        type: ghcr
        image: ghcr.io/elifesciences/app-conveyor

      - id: auto
        type: flux-image
        policy: app-conveyor
        namespace: app-conveyor

      - id: sync
        type: flux-kustomize
        name: app-conveyor
        automation: app-conveyor
        namespace: app-conveyor

      - id: live
        type: k8s-deploy
        kind: StatefulSet
        name: app-conveyor
        namespace: app-conveyor

  - id: epp--staging-epp-client
    name: Enhanced Preprints Client (staging)
    pollIntervalMs: 60000
    steps:
      - id: src
        type: git
        repo: elifesciences/enhanced-preprints-client
        branch: master

      - id: ci
        type: gha
        repo: elifesciences/enhanced-preprints-client
        workflow: ci.yaml

      - id: reg
        type: ghcr
        image: ghcr.io/elifesciences/enhanced-preprints-client

      - id: auto
        type: flux-image
        policy: epp-client
        namespace: epp--staging

      - id: sync
        type: flux-kustomize
        name: epp--staging
        automation: epp-automation
        namespace: epp--staging

      - id: live
        type: k8s-deploy
        name: epp-client
        namespace: epp--staging

  - id: epp--prod-epp-client
    name: Enhanced Preprints Client (prod)
    pollIntervalMs: 60000
    steps:
      - id: src
        type: git
        repo: elifesciences/enhanced-preprints-client
        branch: master

      - id: ci
        type: gha
        repo: elifesciences/enhanced-preprints-client
        workflow: ci.yaml

      - id: reg
        type: ghcr
        image: ghcr.io/elifesciences/enhanced-preprints-client

      - id: pr
        type: gh-pr
        repo: elifesciences/enhanced-preprints-e2e
        author: renovate[bot]
        label: "e2e PR Merged"

      - id: reg-approved
        type: ghcr
        image: ghcr.io/elifesciences/enhanced-preprints-client
        tagPattern: "-approved$"
        label: "Image Approved"

      - id: auto
        type: flux-image
        policy: epp-client-approved
        namespace: epp--prod

      - id: sync
        type: flux-kustomize
        name: epp--prod
        automation: epp-automation
        namespace: epp--prod

      - id: live
        type: k8s-deploy
        name: epp-client
        namespace: epp--prod
